<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="BudgetSpin">
  <defs>
    <linearGradient id="bs-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a6fbd"/>
      <stop offset=".55" stop-color="#1c3f72"/>
      <stop offset="1" stop-color="#152c4a"/>
    </linearGradient>
    <linearGradient id="bs-arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5fcf90"/>
      <stop offset="1" stop-color="#2e9a5f"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="1" y="1" width="30" height="30" rx="8.5" fill="url(#bs-bg)"/>
  <rect x="1.6" y="1.6" width="28.8" height="28.8" rx="8" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.2"/>

  <!-- spin arrow: open ring (~300°) around the coin -->
  <path d="M22.6 8.6 A9.2 9.2 0 1 0 25.1 18.4"
        fill="none" stroke="url(#bs-arc)" stroke-width="2.7" stroke-linecap="round"/>
  <!-- arrowhead -->
  <path d="M19.2 7.0 L23.6 8.0 L22.2 12.3 Z" fill="#5fcf90"/>

  <!-- coin -->
  <circle cx="16" cy="16.4" r="6" fill="#eaf4ee"/>
  <circle cx="16" cy="16.4" r="6" fill="none" stroke="#2e9a5f" stroke-width="1.1"/>
  <!-- $ -->
  <rect x="15.35" y="11.9" width="1.3" height="9" rx="0.65" fill="#1c6b41"/>
  <path d="M18.5 13.6 a3 2.4 0 0 0 -2.6 -1.2 c-3 0 -3.3 3 -0.1 3.4 c3.2 .4 3 3.6 -0.1 3.6 a3 2.4 0 0 1 -2.7 -1.4"
        fill="none" stroke="#1c6b41" stroke-width="1.25" stroke-linecap="round"/>
</svg>
