# CI: every push and PR to main gets verified.
#
# Three verification jobs run in parallel; branch protection will require all
# of them. A failure in any one marks the commit ✗. A fourth job (image) builds
# the production image, scans it, and — only on main — publishes it to GHCR.
#
# Actions are pinned by commit SHA (the trailing comment names the release).
# Tags are mutable pointers — a compromised action repo can move them to
# malicious code (see tj-actions/changed-files, 2025). A SHA is
# content-addressed and cannot be repointed. Dependabot keeps the pins fresh
# via reviewable PRs (.github/dependabot.yml).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the default GITHUB_TOKEN can only read the repo contents.
permissions:
  contents: read

# If a newer commit arrives while this one is still being checked, cancel the
# older run — we only care about the latest state of the branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck, lint, tests, build
    runs-on: ubuntu-latest
    env:
      # Runners default to UTC, which masks timezone bugs (see the addMonths
      # no-op fixed in 09405ff: green in UTC, infinite loop in UTC-3).
      TZ: America/Montevideo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      # npm ci, never npm install: exact lockfile versions or fail.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (zero warnings allowed)
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    # Job-level override: on pull_request events the action lists the PR's
    # commits via the API, which needs pull-requests: read — the workflow
    # default (contents only) left it at none and the call returned 403.
    # Granted to this job only; the other two keep the stricter default.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # gitleaks scans commit history, not just the checkout snapshot.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PR commenting would need pull-requests: write (and Dependabot
          # runs cap the token at read anyway). The red job is the signal;
          # details live in the run log.
          GITLEAKS_ENABLE_COMMENTS: "false"

  dependency-scan:
    name: Dependency scan (osv-scanner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Scans the lockfile against the OSV vulnerability database (SCA).
      # Using the action directly instead of Google's reusable workflow:
      # the latter uploads SARIF to code scanning, which requires Advanced
      # Security on private repos (paid).
      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: --lockfile=./package-lock.json

  # Build the production image, scan it as a gate, generate an SBOM, and — only
  # on main — publish it to GHCR. Runs after the three verification jobs pass.
  # The server still builds its own image for now; Phase 4 switches it to pull
  # this published artifact. "Build once" starts here.
  image:
    name: Build, scan & publish image
    runs-on: ubuntu-latest
    needs: [checks, secrets-scan, dependency-scan]
    # Least privilege: this is the only job that may write packages or upload
    # code-scanning results. The push uses the default GITHUB_TOKEN — no
    # long-lived registry credential.
    permissions:
      contents: read
      packages: write
      security-events: write   # upload SARIF to code scanning
    env:
      # GHCR requires a lowercase owner. Private package (see settings); Phase 4
      # gives the server a read:packages PAT to pull it.
      IMAGE: ghcr.io/mateodaneri/budget-spin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Compute immutable + moving tags and OCI labels from the git metadata.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # Build amd64 and load it into the local Docker daemon so Trivy and syft
      # can inspect the exact artifact BEFORE it is ever pushed. provenance:false
      # keeps it a plain single-arch image (attestations break `load`). The gha
      # cache makes the publish step below a near-instant rebuild.
      - name: Build image (amd64, local — not pushed)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: budgetspin:ci
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Reporting (does NOT fail the build; runs before the gate so the
      #    Security tab and artifacts populate even if the gate blocks) ──────

      # SARIF for GitHub code scanning (the triage dashboard in the Security
      # tab, free on public repos). Includes unfixed findings so they can be
      # seen/accepted; limit-severities-for-sarif keeps it to CRITICAL/HIGH
      # instead of flooding the tab with LOW/UNKNOWN. It deliberately does not
      # load .trivyignore-gate: accepted risks remain visible in reporting.
      - name: Trivy report (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: budgetspin:ci
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true

      # always(): upload even if a later step fails. Skipped for Dependabot,
      # whose token is read-only and can't write security-events.
      - name: Upload SARIF to code scanning
        if: ${{ always() && github.actor != 'dependabot[bot]' }}
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          sarif_file: trivy.sarif

      # SBOM of the scanned image (syft), auto-uploaded as a run artifact: the
      # inventory to answer "are we affected?" when the next CVE drops.
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: budgetspin:ci
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom.spdx.json

      # Trivy JSON (all severities) as a run artifact — download it to import
      # into DefectDojo (scan_type "Trivy"; confirm the exact string against
      # your instance via /api/v2/test_types/). DefectDojo is private, so the
      # push to it is done from your network, not from this cloud runner. This
      # report also remains unfiltered by the gate-only risk acceptances.
      - name: Trivy report (JSON)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: budgetspin:ci
          format: json
          output: trivy.json

      - name: Upload Trivy JSON (for DefectDojo)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-json
          path: trivy.json

      # ── The gate (fails the build; runs after reports are uploaded) ──────
      # Fixable CRITICAL/HIGH in the image (app deps + base OS — a superset of
      # the lockfile osv-scanner sees) fail the build; ignore-unfixed avoids
      # permanent red on unpatched upstream issues. Risk acceptances are scoped
      # to this gate so they don't disappear from SARIF/JSON reporting.
      - name: Scan image (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: budgetspin:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore-gate
          exit-code: "1"

      # Publish only from main: a PR builds and scans (you see the result) but
      # never publishes unmerged code to the registry.
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
